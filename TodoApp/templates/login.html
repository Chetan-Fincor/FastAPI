{% include 'layout.html'%}

<div class="container">
    <div class="card mt-5">

        <div class="card-header">
            Login
        </div>

        <div class="card-body">

            <form method="POST" action="/auth/token">

                <div class="form-group mb-3">
                    <label>Username</label>
                    <input
                        class="form-control"
                        type="text"
                        name="username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group mb-3">
                    <label>Password</label>
                    <input
                        class="form-control"
                        type="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">
                    Login
                </button>

            </form>

        </div>

        <div class="card-footer text-muted">
            <a href="/auth/register-page">Register?</a>
        </div>

    </div>
</div>
